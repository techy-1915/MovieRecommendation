# -------------------------------------------------------
# REQUIRED: Update these values before running the app
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/moviebooking
spring.datasource.username=root
# Replace with your MySQL password (or use env var: ${DB_PASSWORD})
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=8080

# Get your free API key from https://www.themoviedb.org/settings/api
# Replace with your key (or use env var: ${TMDB_API_KEY})
tmdb.api.key=YOUR_TMDB_API_KEY
tmdb.base.url=https://api.themoviedb.org/3
tmdb.image.base.url=https://image.tmdb.org/t/p/w500

# JWT secret — use a long random string in production (or use env var: ${JWT_SECRET})
jwt.secret=movieBookingSecretKey2026VerySecureAndLong
jwt.expiration=86400000

cors.allowed.origins=http://localhost:3000
